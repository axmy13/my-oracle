<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辛言解憂站 - 靈數感應</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #30363d; padding: 25px; border-radius: 20px; background: #161b22; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; text-align: center; font-size: 1.2em; outline: none; }
        input:focus { border-color: #d4af37; }
        .btn-main { background: linear-gradient(45deg, #d4af37, #b8860b); color: #0d1117; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; transition: 0.3s; margin-bottom: 10px; }
        .btn-main:active { transform: scale(0.98); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-fb-share { background: #1877f2; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; font-size: 0.85em; font-weight: bold; }
        .btn-home { background: #30363d; color: #c9d1d9; border: 1px solid #8b949e; padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; font-size: 0.85em; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        
        #result-box { margin-top: 25px; padding: 20px; border: 1px solid #d4af37; border-radius: 15px; display: none; text-align: left; background: rgba(212, 175, 55, 0.05); }
        .oracle-header { color: #d4af37; font-size: 1.1em; font-weight: bold; margin-bottom: 15px; text-align: center; border-bottom: 1px dashed #d4af37; padding-bottom: 10px; }
        .res-text { font-size: 1.05em; line-height: 1.8; white-space: pre-wrap; color: #e6edf3; }
        .disclaimer { font-size: 0.75em; color: #8b949e; margin-top: 20px; line-height: 1.5; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="color: #d4af37; margin-bottom: 5px;">辛言解憂站</h2>
    <p style="color: #8b949e; margin-bottom: 20px;">數理感應 · 啟發心靈</p>
    
    <input type="number" id="numInput" placeholder="請輸入感應到的 3 位靈數">
    <button class="btn-main" onclick="divine()">✨ 啟動感應 ✨</button>

    <div id="result-box">
        <div id="oracleHeader" class="oracle-header">感應結果</div>
        <div id="oracleContent" class="res-text"></div>
        
        <div class="btn-group">
            <button class="btn-fb-share" onclick="shareFB()">🔵 分享啟發</button>
            <a href="https://www.facebook.com/profile.php?id=61582018845158" class="btn-home">🏠 回解憂首頁</a>
        </div>
        
        <p class="disclaimer">
            * 溫馨提示：感應文字僅供啟發參考。人生決策請結合現實審慎考量。願這份啟示能為您帶來平靜。
        </p>
    </div>
</div>

<script>
    const oracleDict = {
        "1": "【感應】目前如晨曦初現，環境正趨向明朗。\n【建議】這是適合為未來佈局的時期。只要保持誠信與耐心，進展會逐漸顯現。",
        "2": "【感應】前方雖有薄霧籠罩，但並非阻礙。\n【建議】此時適合緩步前行。建議先觀察局勢，等內心感到篤定後再做決定。",
        "3": "【感應】目前正處於順風期，阻力相對較小。\n【建議】若有合作機會，可以多加了解與接觸。在確保細節穩妥的前提下，適度推進。",
        "4": "【感應】目前的能量較為紛雜，容易產生內耗。\n【建議】先靜下心來，理清頭緒。不被外界聲音干擾，才是對自己負責的做法。",
        "5": "【感應】這是一個充滿可能性的信號，可能會收穫意外的消息。\n【建議】保持心態開放。即便遇到突發狀況，也請試著從中尋找轉機。",
        "6": "【感應】目前正處於一個瓶頸期，力量有些停滯。\n【建議】不建議強行突破。適當的休息與學習，是在為下一階段積攢能量。",
        "7": "【感應】人際關係中存在微妙的波動，需多加留意。\n【建議】說話前三思，以誠待人。處理糾紛時，退後一步往往能看清全局。",
        "8": "【感應】能量穩定且厚實，利於長遠的規劃。\n【建議】現在適合處理與基礎建設、理財或家庭相關的穩健事務。",
        "9": "【感應】思緒如繁花亂墜，容易感到迷茫或選擇困難。\n【建議】專注於目前最緊要的一件事。學會適時地捨棄，內心會更輕盈。",
        "10": "【感應】一種付出後得到回饋的能量正在靠近。\n【建議】過去的努力正在發酵。請心懷感恩地接受成果，並與身邊的人分享喜悅。"，
        // 11-40 條數據請在後續分批粘貼        "11": "【感應】目前如攀登山峰，過程辛苦但視野即將開闊。\n【建議】請再給自己一點耐心，穩住步調。很多事往往在堅持中迎來轉機。",
        "12": "【感應】有一股潛在的阻礙正在干擾您的步調。\n【建議】檢查是否有被忽略的細節。穩紮穩打地前進，會比追求速度更安全。",
        "13": "【感應】目前的氛圍非常利於團結與交流。\n【建議】主動尋求志同道合的夥伴。溝通與共識，會讓眼前的道路變得平坦。",
        "14": "【感應】心中有光，便無懼環境的明暗。\n【建議】即便現狀不盡如人意，也要守住初心。在安靜中等待時機的轉變。",
        "15": "【感應】過度的自我保護可能讓您錯失成長的機會。\n【建議】試著放下成見，接受新的建議。您會發現世界比想像中更寬廣。",
        "16": "【感應】能量正在快速消耗，身心可能感到疲憊。\n【建議】請優先照顧好自己的健康。適時的停頓，是為了走更長遠的路。",
        "17": "【感應】這是一個提醒您回顧與檢視的信號。\n【建議】參考過去的經驗來修正目前的做法，這比盲目往前衝更有助益。",
        "18": "【感應】一種不確定的氣氛正在蔓延。\n【建議】守好自己的分寸與資源。在不熟悉的領域，請保持應有的審慎。",
        "19": "【感應】目前的運勢如同漲潮，條件正趨於成熟。\n【建議】這是一個積極的信號。建議在實踐中不斷完善計畫，邊做邊調整。",
        "20": "【感應】您正在尋求某種平衡，但目前尚未穩定。\n【建議】不必急於下結論或做出承諾。給彼此一點時間，讓真相浮現。",
        "21": "【感應】目前各方面的資源正慢慢向您靠攏。\n【建議】謙虛地接受幫助。在提升自己的同時，也請不吝給予他人支持。",
        "22": "【感應】小小的挫折是為了提醒您避免更大的偏差。\n【建議】別為了一時的失誤而困擾。有時繞一點路，反而能看到更安全的風景。",
        "23": "【感應】這是一個充滿創意的信號，靈感正在湧現。\n【建議】隨手記錄下您的想法。現在適合進行任何形式的思考與策劃。",
        "24": "【感應】目前需要一種冷靜的智慧來解決問題。\n【建議】控制情緒，用數據和邏輯說話。理性的分析能幫您避開不必要的陷阱。",
        "25": "【感應】變動與遠行的能量正在發揮作用。\n【建議】去不同的環境走走，接觸新事物。心境的轉換，往往能帶來新的轉機。",
        "26": "【感應】目前存在過度承擔責任的傾向。\n【建議】釐清責任的邊界。給予他人成長的空間，也給予自己減輕負擔的權力。",
        "27": "【感應】一種溫暖且平靜的能量正包圍著您。\n【建議】適合與家人相處，或是進行讓身心放鬆的活動。修復能量是目前的重點。",
        "28": "【感應】目前的阻礙可能源於習慣性的舊思維。\n【建議】大膽接觸新的知識。跟上時代的變化，會讓您處理事情更得心應手。",
        "29": "【感應】環境中存在競爭的跡象，帶來些許壓力。\n【建議】專注於自己的步伐，不與他人攀比。您的特色是別人模仿不來的。",
        "30": "【感應】這是收穫與喜悅的能量，氛圍輕鬆。\n【建議】若有重要的消息想分享，近期是不錯的時機。多與人分享正能量。",
        "31": "【感應】目前的狀態似乎需要更多的支持。\n【建議】主動尋求外界的支援或專業建議。團結能幫您分擔不必要的壓力。",
        "32": "【感應】混亂的局面即將回歸條理。\n【建議】從整理生活環境開始。規律的節奏，能讓混亂的思緒重新歸位。",
        "33": "【感應】目前存在過於樂觀而忽略細節的風險。\n【建議】保持清醒，多考慮替代方案。雖然前景看好，但仍需防範未然。",
        "34": "【感應】能量在動能中產生，不宜久坐。\n【建議】增加身體的活動量。體力的適度消耗，反而能讓精神狀態更振奮。",
        "35": "【感應】一種微妙的機緣正在悄悄醞釀。\n【建議】留意生活中的巧合。保持開放的心態，不要輕易否定任何可能性。",
        "36": "【感應】目前的您如同一顆珍珠，尚待磨練與發光。\n【建議】不必急於求成。打磨好自己的技藝與修養，發光的時刻自然會到來。",
        "37": "【感應】有一種面臨抉擇的急迫感。\n【建議】深呼吸，先評估各種選擇的風險。能承擔的後果，才是正確的選擇。",
        "38": "【感應】目前的環境充滿誘惑，容易干擾目標。\n【建議】定下重心，不隨波逐流。守住當下的本分，才不會因小失大。",
        "39": "【感應】一股清新的能量正在注入您的生活。\n【建議】適合開始新計畫或結交新朋友。保持好奇心，迎接生活的變化。",
        "40": "【感應】這是一個關於「沉澱」的信號。\n【建議】目前的時機尚未完全成熟。請給自己一點時間，耐心等待果實飽滿。"
    };

    function divine() {
        const val = document.getElementById('numInput').value;
        if (!val) return;
        const index = (parseInt(val) % 384) || 384;
        const result = oracleDict[index] || "感應正在傳輸中，請稍後刷新試試...";
        
        document.getElementById('oracleHeader').innerText = `感應序號：${index}`;
        document.getElementById('oracleContent').innerText = result;
        document.getElementById('result-box').style.display = 'block';
    }

    function shareFB() {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent("我在【辛言解憂站】得到了一份心靈啟示，推薦給您。");
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`, '_blank');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辛言解憂站 - 賽博靈數</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #30363d; padding: 20px; border-radius: 15px; background: #161b22; }
        img { width: 100px; border-radius: 50%; margin-bottom: 10px; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; text-align: center; font-size: 1.1em; }
        .btn-main { background: linear-gradient(45deg, #d4af37, #b8860b); color: #0d1117; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 90%; }
        #result-box { margin-top: 20px; padding: 15px; border: 1px solid #d4af37; border-radius: 10px; display: none; text-align: left; }
        .gua-name { color: #d4af37; font-size: 1.4em; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .section-title { color: #8b949e; font-size: 0.9em; margin-top: 10px; display: block; }
        .res-text { font-size: 1.05em; line-height: 1.6; }
        .btn-fb { background: #1877f2; color: white; border: none; padding: 8px 15px; border-radius: 20px; margin-top: 15px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/100/0d1117/d4af37?text=Lotus" alt="Logo">
    <h2>解憂占卜站</h2>
    <p style="color: #8b949e;">金蓮花賽博靈數感應系統</p>
    <input type="number" id="numInput" placeholder="輸入3位靈數 (如 103)">
    <button class="btn-main" onclick="divine()">✨ 啟動數理感應 ✨</button>

    <div id="result-box">
        <div id="guaTitle" class="gua-name"></div>
        <span class="section-title">【卦象原文】</span>
        <div id="resOriginal" class="res-text"></div>
        <span class="section-title">【動爻啟示】</span>
        <div id="resYao" class="res-text" style="color: #ffcc00; font-weight: bold;"></div>
        <span class="section-title">【辛言教誨】</span>
        <div id="resAdvice" class="res-text"></div>
        <button class="btn-fb" onclick="shareFB()">🔵 分享臉書 · 傳遞好運</button>
    </div>
</div>

<script>
    const guaNames = ["", "乾天", "兌澤", "離火", "震雷", "巽風", "坎水", "艮山", "坤地"];

    const yaoDict = {
        "11": { n: "乾為天", o: "乾，元亨利貞。", y: ["", "初九：潛龍勿用。", "九二：見龍在田。", "九三：君子終日乾乾。", "九四：或躍在淵。", "九五：飛龍在天。", "上九：亢龍有悔。"], a: "能量極強，但需戒驕戒躁，等待時機成熟。" },
        "88": { n: "坤為地", o: "坤，元亨，利牝馬之貞。", y: ["", "初六：履霜，堅冰至。", "六二：直方大，不習無不利。", "六三：含章可貞。", "六四：括囊，無咎。", "六五：黃裳，元吉。", "上六：龍戰於野。"], a: "厚德載物。目前適合包容與配合，不宜強出頭。" },
        "64": { n: "水雷屯", o: "屯，元亨利貞。勿用有攸往。", y: ["", "初九：磐桓，利居貞。", "六二：屯如邅如。", "六三：即鹿無虞，惟入於林中。", "六四：乘馬班如，求婚媾。", "九五：屯其膏。", "上六：乘馬班如，泣血漣如。"], a: "萬事起頭難。目前的困頓是為了未來的壯大，請保持耐心。" },
        "76": { n: "山水蒙", o: "蒙，亨。匪我求童蒙，童蒙求我。", y: ["", "初六：發蒙，利用刑人。", "九二：包蒙，吉。", "六三：勿用取女。", "六四：困蒙，吝。", "六五：童蒙，吉。", "上六：擊蒙。"], a: "處於迷茫期，宜虛心求教，開啟智慧，不宜盲目決策。" },
        "61": { n: "水天需", o: "需，有孚，光亨，貞吉。", y: ["", "初九：需於郊。", "九二：需於沙。", "九三：需於泥。", "六四：需於血。", "九五：需於酒食。", "上六：入於穴。"], a: "等待時機。此時不宜焦慮，在等待中積蓄能量。" },
        "16": { n: "天水訟", o: "訟，有孚，窒惕，中吉，終凶。", y: ["", "初六：不永所事。", "九二：不克訟。", "六三：食舊德。", "九四：不克訟，復即命。", "九五：訟，元吉。", "上六：或錫之鞶帶。"], a: "慎防爭端與口舌。退一步海闊天空，強求爭勝必有後患。" },
        "86": { n: "地水師", o: "師，貞，丈人吉，無咎。", y: ["", "初六：師出以律。", "九二：在師中，吉。", "六三：師或輿屍。", "六四：師左次。", "六五：田有禽。", "上六：大君有命。"], a: "需要組織與紀律。目前的挑戰需統籌規劃，尤其要遠離小人的影響。" },
        "68": { n: "水地比", o: "比，吉。原筮，元永貞，無咎。", y: ["", "初六：有孚比之。", "六二：比之自內。", "六三：比之匪人。", "六四：外比之。", "九五：顯比。", "上六：比之無首。"], a: "尋求合作與親和。團結身邊的人，但要預防隱藏的變數。" },
        "51": { n: "風天小畜", o: "小畜，亨。密雲不雨。", y: ["", "初九：復自道。", "九二：牽復，吉。", "九三：輿說輻。", "六四：有孚，血去惕出。", "九五：有孚攣如。", "上六：既雨既處。"], a: "積累小的成功。目前力量尚不足以成就大事，宜細水長流。" },
        "12": { n: "天澤履", o: "履虎尾，不咥人，亨。", y: ["", "初九：素履，往無咎。", "九二：履道坦坦。", "六三：眇能視，跛能履。", "九四：履虎尾，愬愬終吉。", "九五：夬履，貞厲。", "上九：視履考祥。"], a: "遵循禮儀與規則。即便如履薄冰，方能化險為夷。" },
        "81": { n: "地天泰", o: "泰，小往大來，吉亨。", y: ["", "初九：拔茅茹，以其匯。", "九二：包荒，用馮河。", "九三：無平不陂。", "六四：翩翩，不富以其鄰。", "六五：帝乙歸妹。", "上六：城復於隍。"], a: "陰陽調和，萬事亨通。這是發展的黃金期，要好好把握。" },
        "18": { n: "天地否", o: "否之匪人，不利君子貞。", y: ["", "初六：拔茅茹，以其匯。", "六二：包承，小人吉。", "六三：包羞。", "九四：有命無咎。", "九五：休否，大人吉。", "上九：傾否。"], a: "溝通阻塞，形勢壓抑。宜堅守底線，等待黑暗過去。" },
        "13": { n: "天火同人", o: "同人於野，亨。利涉大川。", y: ["", "初九：同人於門。", "六二：同人於宗。", "九三：伏戎於莽。", "九四：乘其墉，弗克攻。", "九五：同人先號咷而後笑。", "上九：同人於郊。"], a: "公開透明地與人合作。能集思廣益，利於成就大業。" },
        "31": { n: "火天大有", o: "大有，元亨。", y: ["", "初九：無交害。", "九二：大車以載。", "九三：公用亨於天子。", "九四：匪其彭。", "六五：厥孚交如。", "上九：自天佑之。"], a: "收穫豐碩。此時利於長久保有財富，但需謙遜分利。" },
        "87": { n: "地山謙", o: "謙，亨，君子有終。", y: ["", "初六：謙謙君子。", "六二：鳴謙，貞吉。", "九三：勞謙君子。", "六四：無不利，撝謙。", "六五：不富以其鄰。", "上六：鳴謙，利用行師。"], a: "成功越要低調。這是保護自己的最佳方式。" },
        "48": { n: "雷地豫", o: "豫，利建侯行師。", y: ["", "初六：鳴豫，凶。", "六二：介於石，不終日，貞吉。", "六三：盱豫，悔。", "九四：由豫，大有得。", "六五：貞疾，恆不死。", "上六：冥豫，成有渝。"], a: "順應時勢，心情愉悅。利於策劃與慶典，但需防沉溺於安樂。" }
    };

    function divine() {
        const val = document.getElementById('numInput').value;
        if (!val) return;
        const num = parseInt(val);
        const up = (Math.floor(num / 100) % 8) || 8; 
        const down = (num % 8) || 8;
        const sum = val.split('').reduce((a, b) => a + parseInt(b), 0);
        const move = (sum % 6) || 6;
        
        const key = `${up}${down}`;
        const data = yaoDict[key] || { n: `${guaNames[up]}${guaNames[down]}`, o: "數據加載中...", y: ["", "感應中..."], a: "請等待後續數據包導入。" };

        document.getElementById('guaTitle').innerText = `【 ${data.n} · 動第 ${move} 爻 】`;
        document.getElementById('resOriginal').innerText = data.o;
        document.getElementById('resYao').innerText = data.y[move];
        document.getElementById('resAdvice').innerText = data.a;
        document.getElementById('result-box').style.display = 'block';
    }

    function shareFB() {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent("我在辛言解憂站求得一卦，感應非常準確！");
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`, '_blank');
    }
</script>
</body>
</html>

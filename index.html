<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辛言解憂站 | 金蓮花頻率感應</title>

    <meta property="og:title" content="👉 靜心感應：金蓮花心靈啟示">
    <meta property="og:description" content="輸入你的念頭，找回內心的平靜。✨">
    <meta property="og:url" content="https://axmy13.github.io/my-oracle/">
    <meta property="og:image" content="https://axmy13.github.io/my-oracle/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">

    <style>
        :root { --gold: #D1A75D; --bg: #05070A; }
        body { background: var(--bg); color: var(--gold); font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; box-sizing: border-box; }
        
        .container { 
            text-align: center; background: rgba(15, 18, 24, 0.98); 
            padding: 40px 25px; border-radius: 28px; border: 1px solid rgba(209, 167, 93, 0.3); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); width: 90%; max-width: 420px; 
        }

        .logo-img { width: 120px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--gold)); }
        
        h1 { font-size: 1.4rem; letter-spacing: 4px; margin-bottom: 5px; color: var(--gold); }
        p.subtitle { font-size: 0.85rem; color: #888; margin-bottom: 30px; letter-spacing: 1px; }
        
        input { 
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(209,167,93,0.3); border-radius: 15px; 
            padding: 18px; color: #fff; font-size: 1rem; text-align: center; 
            margin-bottom: 20px; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); outline: none; }

        button { 
            width: 100%; background: linear-gradient(45deg, #D1A75D, #B8860B); color: #000; border: none; 
            padding: 16px; border-radius: 50px; font-weight: bold; 
            font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-bottom: 15px;
        }
        button:hover { filter: brightness(1.1); box-shadow: 0 0 15px rgba(209, 167, 93, 0.4); }

        #result-box { 
            margin-top: 30px; display: none; padding-top: 25px; 
            border-top: 1px solid rgba(209, 167, 93, 0.1); 
        }
        .res-desc { line-height: 1.9; color: #efefef; font-size: 1.05rem; margin-bottom: 25px; }
        
        .disclaimer { font-size: 0.75rem; color: #555; line-height: 1.5; margin-top: 30px; padding: 10px; border: 1px dashed #333; border-radius: 10px; }
        
        .nav-link { color: #888; text-decoration: none; font-size: 0.85rem; margin-top: 30px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <img src="icon.png" alt="Lotus" class="logo-img">
    <h1>解憂占卜站</h1>
    <p class="subtitle">金蓮花能量實驗室</p>
    
    <input type="text" id="userInput" placeholder="請輸入此刻困擾你的念頭、文字或數字" maxlength="50">
    
    <button onclick="calculate()">✨ 開啟感應頻率 ✨</button>

    <div id="result-box">
        <div class="res-desc" id="resDesc"></div>
    </div>

    <div class="disclaimer">
        ⚠️ 溫馨提醒：本工具僅供心靈探索與壓力舒緩使用，不構成投資建議。
    </div>

    <a href="https://www.facebook.com/profile.php?id=61582018845158" target="_blank" class="nav-link">← 返回辛言解憂站 FB 專頁</a>
</div>

<script>
    const library = {
        action: ["宇宙的流轉提示你：現在適合", "金蓮花的頻率建議你：試著先", "此刻的內在能量導引你：去", "這份感應提醒你：不妨", "當下的氣場建議你：保持", "金蓮花的智慧提示：請深度"],
        target: ["觀照自己內心的波瀾", "整理目前的思緒並靜待時機", "信任你過去累積的智慧", "與內在的自我進行對話", "調整前進的節奏而非急於求成", "釋放對未知結果的焦慮", "審視目前計畫中的微小細節", "在安靜中尋找問題的核心"],
        ending: ["，蓮花自會綻放其美。", "，安安靜靜地觀看事物的流轉。", "，答案往往藏在最平靜的時刻。", "，持守正念，自然會有所收穫。", "，這是一個適合內省與充電的時刻。", "，不急不躁，才能看清真相。"]
    };

    function calculate() {
        const input = document.getElementById('userInput').value.trim();
        if (!input) { alert("請先輸入您的念頭。"); return; }
        const resBox = document.getElementById('result-box');
        const resDesc = document.getElementById('resDesc');
        let today = new Date();
        let seed = today.getFullYear().toString() + (today.getMonth() + 1).toString() + today.getDate().toString() + input;
        let h1 = 0, h2 = 0, h3 = 0;
        for (let i = 0; i < seed.length; i++) {
            let char = seed.charCodeAt(i);
            h1 = ((h1 << 5) - h1) + char;
            h2 = ((h2 << 7) - h2) + char;
            h3 = ((h3 << 3) - h3) + char;
        }
        resDesc.innerText = `${library.action[Math.abs(h1) % library.action.length]}${library.target[Math.abs(h2) % library.target.length]}${library.ending[Math.abs(h3) % library.ending.length]}`;
        resBox.style.display = 'block';
    }
</script>

</body>
</html>
